
<!DOCTYPE html>  
<html lang="en">  
<head>  
    <meta charset="UTF-8">  
    <meta name="viewport" content="width=device-width, initial-scale=1.0">  
    <title>基于犯罪率的商业选址参考</title>  
    
    <!-- 依赖加载 -->  
    <script crossorigin src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"></script>  
    <script crossorigin src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"></script>  
    <script src="https://unpkg.com/@babel/standalone@7.22.20/babel.min.js"></script>  
    <script src="https://cdn.tailwindcss.com?plugins=forms,typography,aspect-ratio"></script>  
</head>  
<body>  
    <div id="loading" class="fixed top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 text-xl">  
        loading...  
    </div>  
    
    <div id="root"></div> 

    <!--components-->
    <script type="text/babel" src="js/constants.js"></script>
    <script type="text/babel" src="js/app.js"></script>

    <script>
        window.parent.postMessage({ action: "ready" }, "*"); 
        
        window.console = new Proxy(console, {
            get(target, prop) {
                if (['log', 'warn', 'error'].includes(prop)) {
                    return new Proxy(target[prop], {
                        apply(fn, thisArg, args) {
                            fn.apply(thisArg, args);
                            window.parent.postMessage({ action: 'console', 
                                type: prop, 
                                args: args.map((arg) => {
                                    try {
                                        return JSON.stringify(arg).replace(/^["']|["']$/g, '');
                                    } catch (e) {
                                        return arg;
                                    }
                                }) 
                            }, '*');
                        }
                    });
                }
                return target[prop];
            }
        });
    </script>
</body>
</html>
